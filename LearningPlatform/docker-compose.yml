# Run from this directory (the folder that contains package.json):
#   docker compose --env-file .env up --build
# Required in .env or shell: AUTH_SECRET, PAYLOAD_SECRET, SEED_ADMIN_PASSWORD
# (see DOCKER.md)

services:
  app:
    build: .
    restart: unless-stopped
    stdin_open: true
    tty: true
    environment:
      DATABASE_URL: "${DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/exam_prep_db?schema=public}"
      PAYLOAD_DATABASE_URL: "${PAYLOAD_DATABASE_URL_DOCKER:-postgresql://postgres:postgres@postgres:5432/exam_prep_db?schema=public}"
      # SECURITY: AUTH_SECRET and PAYLOAD_SECRET MUST be set in your environment.
      # Generate with: openssl rand -base64 32
      AUTH_SECRET: "${AUTH_SECRET:?AUTH_SECRET must be set (generate with: openssl rand -base64 32)}"
      PAYLOAD_SECRET: "${PAYLOAD_SECRET:?PAYLOAD_SECRET must be set (generate with: openssl rand -base64 32)}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      # Auth.js: container uses NODE_ENV=production, so host must be trusted for
      # http://localhost:3000. Hardcode true — do not substitute from .env (a copy of
      # .env.example often sets AUTH_TRUST_HOST=false for local npm dev, which breaks Compose).
      AUTH_TRUST_HOST: "true"
      # SECURITY: SEED_ADMIN_PASSWORD MUST be set for first-time cms:seed inside the entrypoint.
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD:?SEED_ADMIN_PASSWORD must be set (generate with: openssl rand -base64 24)}"
      SEED_ADMIN_EMAIL: "${SEED_ADMIN_EMAIL:-admin@example.com}"
      # After the first successful boot, set SKIP_CMS_SEED=1 in .env to skip admin seed on every restart.
      SKIP_CMS_SEED: "${SKIP_CMS_SEED:-}"
      # Set to 1 once to run content import (npm run content:import:all) before Next.js starts; then remove.
      CONTENT_IMPORT: "${CONTENT_IMPORT:-}"
      NODE_ENV: "production"
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ./public/media:/app/public/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:'+(process.env.PORT||'3000')+'/api/ping').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 180s

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: exam_prep_db
    ports:
      # Use 5433 on host by default to avoid clashing with other local Postgres containers.
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    environment:
      # SECURITY: Override these with strong credentials in your .env file.
      # For local development we provide safe defaults so the compose file parses.
      # DO NOT use these defaults in production. Set PGADMIN_EMAIL and PGADMIN_PASSWORD
      # in your environment or via an .env file when running locally.
      PGADMIN_DEFAULT_EMAIL: "${PGADMIN_EMAIL:-admin@example.com}"
      PGADMIN_DEFAULT_PASSWORD: "${PGADMIN_PASSWORD:-changeme}"
    ports:
      # Bind to localhost only — do NOT expose pgAdmin to 0.0.0.0 in production.
      - "127.0.0.1:5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
